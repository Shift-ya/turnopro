app = "prod-turnow-api"
primary_region = "gru"

[build]

[env]
  SPRING_PROFILES_ACTIVE = "prod"
  JAVA_OPTS = "-Dserver.address=0.0.0.0"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  interval = "15s"
  timeout = "5s"
  grace_period = "40s"
  method = "GET"
  path = "/api/actuator/health"
  protocol = "http"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1