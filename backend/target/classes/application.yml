server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: turnopro-backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/turnopro}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: false

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@turnopro.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# JWT Configuration
app:
  jwt:
    secret: ${JWT_SECRET:TurnoPro_Super_Secret_Key_2024_Change_In_Production_Min_256_bits}
    expiration: ${JWT_EXPIRATION:86400000}       # 24h en ms
    refresh-expiration: ${JWT_REFRESH:604800000} # 7 días en ms

  # CORS
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

  # Frontend URL (para links en emails)
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# Logging
logging:
  level:
    com.turnopro: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
