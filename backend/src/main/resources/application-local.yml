server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: turnow-backend

  datasource:
    url: jdbc:postgresql://db.xfznqfmstbfphkubeotb.supabase.co:5432/postgres?sslmode=require
    username: postgres
    password: DevTurnow2026!
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 8
      minimum-idle: 2
